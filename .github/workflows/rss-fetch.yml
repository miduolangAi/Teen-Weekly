yaml
name: Fetch RSS
on:
  workflow_dispatch:
  schedule:
    cron: '0 20   6'
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      uses: actions/checkout@v4
      name: Fetch RSS
        uses: suisei-cn/rss-action@v2
        with:
          url: https://www.sciencenews.org/feed
          output: ./weekly-draft/raw.json
